[env]
RUST_FONTCONFIG_DLOPEN = "1"

[alias]
# Set up development environment
setup-dev = "run --manifest-path .cargo/setup-dev/Cargo.toml --bin setup-dev"

# Development aliases
dev = "watch -x run"
test-watch = "watch -x test"
lint = "clippy -- -D warnings"
format = "fmt --all"
check-all = "run --manifest-path .cargo/setup-dev/Cargo.toml --bin check-all-script"
