name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver release version without the leading v'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release Context
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release_meta.outputs.TAG }}
      version: ${{ steps.release_meta.outputs.VERSION }}
      should_build: ${{ steps.release_meta.outputs.SHOULD_BUILD }}
    steps:
      - name: Determine release metadata and build need
        id: release_meta
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release_json_path="${RUNNER_TEMP}/release.json"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version='${{ github.event.inputs.version }}'

            if [[ -z "${version}" ]]; then
              echo "Error: version input is required when triggering via workflow_dispatch." >&2
              exit 1
            fi

            if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$ ]]; then
              echo "Error: invalid version '${version}' provided via workflow_dispatch; expected semver-like value (e.g. 1.2.3 or 1.2.3-beta.1)." >&2
              exit 1
            fi

            tag="v${version}"
          else
            tag="${GITHUB_REF#refs/tags/}"
            version="${tag#v}"
          fi

          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${tag}"
          http_code="$(curl -sS -o "${release_json_path}" -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url")"

          should_build="true"
          if [[ "${http_code}" == "200" ]]; then
            # Python exit code drives shell branching:
            # 0 => assets complete (skip build), 1 => assets missing (build needed).
            if RELEASE_JSON_PATH="${release_json_path}" python -c "import json, os, sys; data=json.load(open(os.environ['RELEASE_JSON_PATH'], 'r', encoding='utf-8')); assets={a.get('name') for a in data.get('assets', [])}; required={'rust_browser_handler_windows.zip','rust_browser_handler_linux.tar.gz'}; missing=required-assets; sys.stderr.write(f'Missing release assets: {sorted(missing)}\n') if missing else None; sys.exit(0 if not missing else 1)"            then
              should_build="false"
            fi
          elif [[ "${http_code}" != "404" ]]; then
            echo "Failed querying release API (HTTP ${http_code})" >&2
            cat "${release_json_path}" >&2
            exit 1
          fi

          echo "TAG=${tag}" >> "$GITHUB_OUTPUT"
          echo "VERSION=${version}" >> "$GITHUB_OUTPUT"
          echo "SHOULD_BUILD=${should_build}" >> "$GITHUB_OUTPUT"

  build:
    name: Build and Release
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows
            ext: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux
            ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create portable package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # Clean output directory to avoid stale files
          if (Test-Path "rust_browser_handler_portable") {
            Remove-Item -Recurse -Force "rust_browser_handler_portable"
          }

          New-Item -ItemType Directory -Path rust_browser_handler_portable/docs -Force
          Copy-Item target/${{ matrix.target }}/release/rust_browser_handler${{ matrix.ext }} rust_browser_handler_portable/
          Copy-Item README.md rust_browser_handler_portable/docs/

          # Create ZIP archive
          Compress-Archive -Path rust_browser_handler_portable/* -DestinationPath rust_browser_handler_${{ matrix.name }}.zip

      - name: Create portable package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Clean output directory to avoid stale files
          rm -rf rust_browser_handler_portable
          mkdir -p rust_browser_handler_portable/docs

          cp target/${{ matrix.target }}/release/rust_browser_handler${{ matrix.ext }} rust_browser_handler_portable/
          cp README.md rust_browser_handler_portable/docs/

          # Create TAR.GZ archive
          tar -czf rust_browser_handler_${{ matrix.name }}.tar.gz -C rust_browser_handler_portable .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: rust_browser_handler_${{ matrix.name }}
          path: rust_browser_handler_${{ matrix.name }}.*

  release:
    name: Create Release
    needs: [prepare, build]
    if: ${{ !cancelled() && needs.prepare.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-latest
    env:
      RELEASE_BODY: |
        # Rust Browser Handler v${{ needs.prepare.outputs.version }}

        ## Installation

        ### Windows (Portable)
        1. Download `rust_browser_handler_windows.zip`
        2. **Extract to a permanent location** (recommended: `C:\Program Files\RustBrowserHandler\`)
        3. Execute `rust_browser_handler.exe register` to register as the default browser handler
        4. Use the `open-settings` command to verify registration or access Windows Default Apps settings

        ### Linux (Portable)
        1. Download `rust_browser_handler_linux.tar.gz`
        2. **Extract to a permanent location** (recommended: `~/bin/` or `/usr/local/bin/`)
        3. Execute `./rust_browser_handler register` to register as the default browser handler
        4. The application will integrate with your desktop environment using XDG standards

        ## Features
        - Cross-platform browser handler (Windows registry + Linux XDG integration)
        - Rule-based URL routing
        - Interactive browser selection
        - Command-line interface

        ## Supported Platforms
        - **Windows**: Full registry-based default handler integration
        - **Linux**: XDG desktop integration (works with GNOME, KDE, XFCE, and other desktop environments)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure release tag exists (workflow dispatch)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          tag='${{ needs.prepare.outputs.tag }}'
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
          fi

      - name: Download all artifacts
        if: needs.prepare.outputs.should_build == 'true'
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts

      - name: Create or update release (with assets)
        if: needs.prepare.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Rust Browser Handler v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: false
          overwrite_files: true
          files: |
            artifacts/rust_browser_handler_windows/rust_browser_handler_windows.zip
            artifacts/rust_browser_handler_linux/rust_browser_handler_linux.tar.gz
          body: ${{ env.RELEASE_BODY }}

      - name: Create or update release (metadata only)
        if: needs.prepare.outputs.should_build != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Rust Browser Handler v${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: false
          overwrite_files: true
          body: ${{ env.RELEASE_BODY }}
